{% extends 'frontend/base.html' %}
{% block title %}个人资料 - 我的平台{% endblock %}
{% block page_content %}
<div class="form-page">
    <h2>个人资料</h2>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>手机号</label>
        <input value="{{ user.phone }}" disabled>
        <label>用户名</label>
        {{ form.username }}
        <label>登录密码</label>
        {{ form.password }}
        <label>支付密码</label>
        {{ form.pay_password }}
        <button type="submit" class="btn btn-primary">保存修改</button>
    </form>
</div>
{% endblock %}
